<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>8 Puzzle</title>

<style>
    body {
        font-family: Arial;
        text-align: center;
        background-color: #f0f0f0;
    }

    #game-board {
        width: 190px;
        margin: 20px auto;
        display: grid;
        grid-template-columns: repeat(3, 60px);
        gap: 5px;
    }

    .tile {
        width: 60px;
        height: 60px;
        font-size: 18px;
        background-color: white;
        border: none;
        cursor: pointer;
        box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .empty {
        background-color: lightgray;
        box-shadow: none;
        cursor: default;
    }

    button {
        margin-top: 10px;
        padding: 5px 10px;
    }
</style>
</head>

<body>

<h3>8 Puzzle</h3>
<p>Arrange the numbers from 1 to 8</p>

<div id="game-board"></div>
<div id="status"></div>
<button onclick="resetGame()">Reset</button>

<script>
let tiles = [1,2,3,4,5,6,7,8,0];

function shuffle() {
    tiles.sort(() => Math.random() - 0.5);
}

function render() {
    const board = document.getElementById("game-board");
    board.innerHTML = "";

    tiles.forEach((value, i) => {
        const btn = document.createElement("button");

        if (value === 0) {
            btn.classList.add("empty");
            btn.disabled = true;
        } else {
            btn.classList.add("tile");
            btn.innerText = value;
            btn.onclick = () => move(i);
        }

        board.appendChild(btn);
    });
}

function move(i) {
    const empty = tiles.indexOf(0);

    const valid = [empty-1, empty+1, empty-3, empty+3];

    if (valid.includes(i)) {
        if (empty % 3 === 0 && i === empty-1) return;
        if (empty % 3 === 2 && i === empty+1) return;

        [tiles[empty], tiles[i]] = [tiles[i], tiles[empty]];

        render();
        checkWin();
    }
}

function checkWin() {
    if (tiles.join() === "1,2,3,4,5,6,7,8,0") {
        document.getElementById("status").innerText = "You solved it!";
    }
}

function resetGame() {
    shuffle();
    document.getElementById("status").innerText = "";
    render();
}

shuffle();
render();
</script>

</body>
</html>
