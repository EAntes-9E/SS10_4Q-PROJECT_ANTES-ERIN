<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PyScript 8-Puzzle</title>
    <link rel="stylesheet" href="https://pyscript.net">
    <script type="module" src="https://pyscript.net"></script>
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; background: #faf8ef; color: #776e65; }
        #game-container { max-width: 320px; margin: 40px auto; }
        #grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            background: #bbada0; padding: 10px; border-radius: 6px; 
        }
        .tile { 
            width: 80px; height: 80px; background: #eee4da; border: none;
            border-radius: 4px; font-size: 2rem; font-weight: bold; color: #776e65;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .tile:hover { background: #edc22e; color: white; }
        .empty { background: #cdc1b4; cursor: default; }
        .empty:hover { background: #cdc1b4; }
        #status { height: 30px; margin: 20px; font-weight: bold; color: #2ecc71; }
        button#reset { 
            background: #8f7a66; color: white; border: none; padding: 10px 20px; 
            border-radius: 4px; font-weight: bold; cursor: pointer; 
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>8-Puzzle</h1>
        <div id="status"></div>
        <div id="grid"></div>
        <br>
        <button id="reset">New Game</button>
    </div>

    <script type="py">
        import random
        from pyscript import document, when

        state = [1, 2, 3, 4, 5, 6, 7, 8, 0]

        def is_solvable(tiles):
            # A puzzle is solvable if the number of inversions is even
            flat = [t for t in tiles if t != 0]
            inversions = sum(1 for i in range(len(flat)) for j in range(i+1, len(flat)) if flat[i] > flat[j])
            return inversions % 2 == 0

        def shuffle_board():
            global state
            random.shuffle(state)
            while not is_solvable(state) or state == [1, 2, 3, 4, 5, 6, 7, 8, 0]:
                random.shuffle(state)
            render()

        def render():
            grid = document.getElementById("grid")
            grid.innerHTML = ""
            for i, val in enumerate(state):
                tile = document.createElement("div")
                tile.className = "tile" + (" empty" if val == 0 else "")
                tile.innerText = str(val) if val != 0 else ""
                
                # Use a closure to capture the correct index for the click handler
                tile.onclick = lambda e, idx=i: handle_click(idx)
                grid.appendChild(tile)

        def handle_click(idx):
            empty_idx = state.index(0)
            
            # Check adjacency (Up, Down, Left, Right)
            row, col = divmod(idx, 3)
            erow, ecol = divmod(empty_idx, 3)
            
            if abs(row - erow) + abs(col - ecol) == 1:
                state[empty_idx], state[idx] = state[idx], state[state.index(0)]
                render()
                check_win()

        def check_win():
            if state == [1, 2, 3, 4, 5, 6, 7, 8, 0]:
                document.getElementById("status").innerText = "You Solved It!"

        @when("click", "#reset")
        def reset_game(event):
            document.getElementById("status").innerText = ""
            shuffle_board()

        # Initial Load
        shuffle_board()
    </script>
</body>
</html>
